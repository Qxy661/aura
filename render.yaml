services:
  - type: web
    name: aura-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: http://token-plan-sgp.xiaomimimo.com/v1
      - key: LLM_MODEL
        value: mimo-v2.5
      - key: PYTHON_VERSION
        value: 3.9.18
